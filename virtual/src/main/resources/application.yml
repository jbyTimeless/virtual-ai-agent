server:
  port: 8080
  servlet:
    encoding:
      enabled: true
      force: true
      charset: UTF-8
spring:
  application:
    name: VirtualAi
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:mysql://14.103.17.71:3306/saa_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useJDBCCompliantTimezoneShift=true
    username: root
    password: magna123
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: SaaHikariCP
      connection-test-query: SELECT 1
      leak-detection-threshold: 60000
  ai:
    # 阿里云DashScope大模型配置
    dashscope:
      api-key: ${aliQwen-api} # 建议通过环境变量/配置中心注入，不要硬编码
      chat:
        options:
          model: qwen-plus
      embedding:
        options:
          model: text-embedding-v3 # 该模型向量维度为1024，与下方dimensions匹配
    # ========== Redis VectorStore 核心配置（重点） ==========
    vectorstore:
      redis:
        # 1. 索引基础配置
        initialize-schema: true # 启动时自动创建Redis索引（首次运行必须为true，后续可改为false）
        index-name: "custom-index:" # Redis向量索引名称（自定义，建议小写+下划线）
        prefix: "custom-prefix:" # 向量数据在Redis中的Key前缀（如：custom-prefix:vector:123）
        # 2. 向量核心参数（必须与embedding模型匹配）
        dimensions: 1024 # text-embedding-v3的向量维度固定为1024，不可修改
        distance-type: COSINE # 距离计算方式（核心！可选：COSINE/ EUCLIDEAN/ MANHATTAN）
        similarity-threshold: 0.7 # 相似度阈值（0-1，只返回相似度≥0.7的结果）
        # 3. 索引类型配置（Redis Stack必填）
        index-type: FLAT # 向量索引类型（FLAT：精准检索，HNSW：高效近似检索，新手先选FLAT）
        # 4. 可选：HNSW索引参数（仅index-type=HNSW时生效）
        # m: 16 # HNSW的M参数（邻居数量）
        # ef-construction: 100 # 构建索引时的ef参数
        # ef-search: 20 # 查询时的ef参数
        # 5. 其他优化配置
        score-name: similarity # 相似度字段名称
        keyspace: hash # 数据存储结构（hash/JSON，建议hash）
  # ========== Redis基础连接配置（适配VectorStore） ==========
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      #username: default
      #password: 123456
      database: 0
      timeout: 2000
      jedis:
        pool:
          max-active: 20 # 连接池最大连接数
          max-idle: 10 # 最大空闲连接
          min-idle: 5 # 最小空闲连接
          max-wait: 3000
  mail:
    host: smtp.qq.com
    port: 465
    username: 1741245720@qq.com
    password: fghnrkjitbhnceff
    protocol: smtp
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true

app:
  jwt:
    secret: VirtualAi3DDefaultSecretKeyForJWT2026!
    expiration: 86400000

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.boyan.vir.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.zaxxer.hikari: DEBUG
    org.springframework.jdbc: DEBUG
    com.mysql.cj: DEBUG
    com.boyan.vir: DEBUG
    org.springframework.ai: DEBUG # 新增：打印Spring AI VectorStore日志，方便排查问题
    root: INFO